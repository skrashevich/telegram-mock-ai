server:
  host: "0.0.0.0"
  port: 8081
  read_timeout: 60s
  write_timeout: 60s

llm:
  enabled: true
  api_type: "openai"                       # "openai" (default) or "anthropic"
  base_url: "http://localhost:11434/v1"    # Ollama, LM Studio, OpenAI, etc.
  api_key: ""                              # Set via TELEGRAM_MOCK_LLM_API_KEY env var
  model: "gpt-4o-mini"
  temperature: 0.8
  max_tokens: 512
  timeout: 30s
  response_delay_min: 500ms
  response_delay_max: 3s
  # system_prompt: "Custom system prompt for simulated users"

  # Anthropic example:
  # api_type: "anthropic"
  # base_url: "http://169.254.169.252/gateway/llm/anthropic/v1"
  # model: "claude-sonnet-4-5-20250929"
  # max_tokens: 1024

proactive:
  enabled: false
  interval_min: 10s
  interval_max: 60s
  event_types:
    - message
  scenarios:
    - type: user_message
      weight: 0.6
    - type: new_member
      weight: 0.1
    - type: member_left
      weight: 0.05
    - type: photo_message
      weight: 0.15
    - type: sticker_message
      weight: 0.1

webhook:
  max_retries: 3
  retry_delay: 1s
  timeout: 10s

seed:
  # LLM-powered seed generation (auto-creates realistic users, groups, channels)
  generate:
    enabled: false              # Set to true to auto-generate seed data via LLM on startup
    users_count: 10             # Number of users to generate
    groups_count: 3             # Number of group chats
    channels_count: 1           # Number of channels
    locale: "ru"                # Language for names/titles: "ru", "en", "mixed", etc.
    max_retries: 2              # LLM call retry attempts

  # Manual seed data (always applied, works alongside generated data)
  users:
    - id: 1001
      first_name: "Alice"
      username: "alice"
    - id: 1002
      first_name: "Bob"
      last_name: "Smith"
      username: "bob_smith"
    - id: 1003
      first_name: "Charlie"
      username: "charlie"
  chats:
    - id: -1001
      type: "group"
      title: "Test Group"
      members: [1001, 1002, 1003]
    - id: -1002
      type: "supergroup"
      title: "Development Chat"
      members: [1001, 1002]
  bots:
    - token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
      username: "test_bot"
      first_name: "Test Bot"

log:
  level: "info"        # debug, info, warn, error
  format: "text"       # text or json

admin:
  enabled: true
  port: 8082
